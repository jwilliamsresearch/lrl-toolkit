# lrl-toolkit project: kurmanji (Kurmanji Kurdish, Latin script)
# Full adaptation run of Qwen2.5-1.5B on the RTX 4080 (QLoRA 4-bit).
# Gated sources (oscar, flores) are omitted because no HF_TOKEN is set; add a
# token and re-add them + the flores benchmark to widen coverage.
name: kurmanji
language: kurmanji
base_model: qwen3-1.7b     # newer Apache-2.0 base; same VRAM/time class as qwen2.5-1.5b
compute: consumer_gpu
seed: 42

ingest:
  sources: [wikipedia, culturax, madlad400, fineweb2]   # all cleanly-licensed (fineweb2 ODC-BY, auto-added by profile)
  max_gb: 5

clean:
  lang_id: glotlid
  dedup: minhash
  min_quality: 0.6

tokenizer:
  strategy: extend
  added_tokens: 8000

pretrain:
  method: qlora
  epochs: 1                # full epoch now, no step cap (~28k steps, ~6.4 days on the 4080)
  seq_len: 2048

convdata:
  translate: [dolly]         # open instruction set, translated En->kmr via NLLB
  translate_limit: 2000      # was 500; fine now that per-item translation was never the bottleneck
  translate_backend: nllb
  provider: ollama           # local teacher for synth (ToS-safe)
  model: qwen2.5:14b
  synth:
    provider: ollama
    model: qwen2.5:14b
    n: 3000                 # now reachable: teacher.py batches requests instead of one truncated call
  review: false              # unattended run: skip the human-review gate

finetune:
  method: qlora
  epochs: 3

evaluate:
  # Coverage-aware: each self-reports whether it covers Kurmanji. Expect
  # native_cloze + perplexity to run (universal, intrinsic), belebele/global_mmlu
  # to report "not covered" (Kurmanji is in neither), flores "gated" (no HF_TOKEN),
  # and judge to run via the local teacher (with its LRL-unreliability caveat).
  benchmarks: [native_cloze, perplexity, belebele, global_mmlu, flores, judge]
  limit: 200
  human_review: true          # emit a native-speaker output-review queue
  human_review_n: 50

export:
  quantize: [gguf_q4_k_m]
  make_ollama_modelfile: true
  push_to_hub: false
