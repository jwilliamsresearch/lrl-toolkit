device: cuda
precision: bf16
quantization: 4bit
per_device_batch_size: 1
gradient_accumulation_steps: 16
gradient_checkpointing: true
use_unsloth: false
distributed: none
max_seq_len_cap: 2048
notes: >
  Default profile: a single 8-24GB consumer GPU (also Colab/Kaggle). QLoRA/4-bit,
  gradient checkpointing, small batch with accumulation. Set use_unsloth: true if
  Unsloth is installed for ~2x speed / lower VRAM.
