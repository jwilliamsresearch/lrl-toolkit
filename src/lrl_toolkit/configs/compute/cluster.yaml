device: cuda
precision: bf16
quantization: none
per_device_batch_size: 8
gradient_accumulation_steps: 2
gradient_checkpointing: true
use_unsloth: false
distributed: deepspeed
max_seq_len_cap: null
notes: >
  Multi-GPU / multi-node via Accelerate + DeepSpeed (switch to 'fsdp' if preferred).
  Advanced profile for serious continued pretraining; not the default.
