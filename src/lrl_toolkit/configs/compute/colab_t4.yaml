device: cuda
precision: bf16          # auto-downgrades to fp16 on GPUs without bf16 (e.g. Colab T4)
quantization: 4bit
per_device_batch_size: 4  # the default profile's batch=1 leaves a 16 GB T4 half-idle;
                          # 4 is a safe middle ground for large-vocab models (Qwen3 ~151k)
gradient_accumulation_steps: 4
gradient_checkpointing: true
use_unsloth: false
distributed: none
max_seq_len_cap: 512      # caps activations AND the per-step logits tensor, which for a
                          # 150k-vocab model is what OOMs a T4 at longer sequences
notes: >
  Tuned for a free Google Colab T4 (16 GB). Bigger batch than consumer_gpu so the GPU is
  actually used, fp16 (Turing has no hardware bf16), and a 512 seq cap — large-vocab models
  (Qwen3) blow up the loss logits tensor at longer sequences on a 16 GB card. Works on
  L4 / A100 too (bf16 activates automatically there; raise the cap if you have the VRAM).
