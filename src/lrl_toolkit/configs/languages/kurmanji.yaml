display_name: Kurmanji Kurdish
iso639_3: kmr
iso639_1: ku
nllb_code: kmr_Latn
scripts: [Latin]
default_script: Latin
direction: ltr
family: Iranian (Northwestern)
dialects: [Northern Kurdish]
normalization:
  unicode_form: NFC
  normalize_digits: false
  rules: [kurdish_latin]   # normalize î/û/ê/ç/ş and common variant spellings
sources:
  - connector: wikipedia
    params: {wiki: ku, license: CC-BY-SA-4.0, url: "https://ku.wikipedia.org"}
    notes: Kurdish (Kurmanji, Latin script) Wikipedia.
  - connector: glot500
    params: {glot: kmr_Latn, license: mixed}
  - connector: culturax
    params: {lang: ku, license: ODC-BY-1.0}
  - connector: madlad400
    params: {lang: ku, variant: clean, license: ODC-BY-1.0}
  - connector: oscar
    params: {lang: ku, license: CC0-1.0}
    notes: OSCAR-2301 — GATED; set HF_TOKEN.
  - connector: opus
    params: {src: ku, tgt: en, corpora: [OpenSubtitles, Tatoeba, NLLB], license: mixed}
  - connector: flores
    params: {flores: kmr_Latn, license: CC-BY-SA-4.0}
    notes: GATED; set HF_TOKEN.
notes: >
  Kurmanji is written in Latin script; Sorani (ckb) is a separate profile in
  Arabic script. Keep the two apart — script/dialect is a first-class axis here.
