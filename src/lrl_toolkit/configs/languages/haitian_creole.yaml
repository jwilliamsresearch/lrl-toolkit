display_name: Haitian Creole
iso639_3: hat
iso639_1: ht
nllb_code: hat_Latn
scripts:
- Latin
default_script: Latin
direction: ltr
dialects: []
normalization:
  unicode_form: NFC
  normalize_digits: false
  rules: []
sources:
- connector: wikipedia
  params:
    wiki: ht
    license: CC-BY-SA-4.0
    url: https://ht.wikipedia.org
- connector: glot500
  params:
    glot: hat_Latn
    license: mixed
- connector: culturax
  params:
    lang: ht
    license: ODC-BY-1.0
- connector: madlad400
  params:
    lang: ht
    variant: clean
    license: CC-BY-4.0
- connector: oscar
  params:
    lang: ht
    license: CC0-1.0
  notes: >
    OSCAR-2301 access is currently SUSPENDED by OSCAR's maintainers (checked
    2026-07-21), independent of HF_TOKEN. Also, CC0-1.0 covers only the
    dataset's metadata/packaging, not the underlying crawled text, which OSCAR
    explicitly disclaims holding copyright over. Do not add to ingest.sources
    until access is restored and the text-license caveat is reviewed.
- connector: opus
  params:
    src: ht
    tgt: en
    corpora:
    - OpenSubtitles
    - Tatoeba
    - NLLB
    license: mixed

instruction_sources:
- repo: CohereForAI/aya_dataset
  instruction_field: inputs
  response_field: targets
  select_field: language_code
  select_value: hat
  limit: 5000
  notes: Aya human-written instructions (Apache-2.0), filtered to hat.
