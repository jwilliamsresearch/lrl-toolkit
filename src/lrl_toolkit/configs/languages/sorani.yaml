display_name: Sorani Kurdish
iso639_3: ckb
iso639_1: null
nllb_code: ckb_Arab
scripts: [Arabic]
default_script: Arabic
direction: rtl
family: Iranian (Northwestern)
dialects: [Central Kurdish]
normalization:
  unicode_form: NFC
  normalize_digits: true
  rules: [arabic_presentation_forms, sorani_arabic]  # normalize ک/ك, ی/ي, ه/ە etc.
sources:
  - connector: wikipedia
    params: {wiki: ckb, license: CC-BY-SA-4.0, url: "https://ckb.wikipedia.org"}
    notes: Central Kurdish (Sorani, Arabic script) Wikipedia.
  - connector: glot500
    params: {glot: ckb_Arab, license: mixed}
  - connector: culturax
    params: {lang: ckb, license: ODC-BY-1.0}
  - connector: madlad400
    params: {lang: ckb, variant: clean, license: CC-BY-4.0}
  - connector: oscar
    params: {lang: ckb, license: CC0-1.0}
    notes: >
      OSCAR-2301 access is currently SUSPENDED by OSCAR's maintainers (checked
      2026-07-21), independent of HF_TOKEN. Also, CC0-1.0 covers only the
      dataset's metadata/packaging, not the underlying crawled text, which OSCAR
      explicitly disclaims holding copyright over. Do not add to ingest.sources
      until access is restored and the text-license caveat is reviewed.
  - connector: opus
    params: {src: ckb, tgt: en, corpora: [OpenSubtitles, Tatoeba, NLLB], license: mixed}
notes: >
  Right-to-left Arabic script with Kurdish-specific letters. Character
  normalization (ک vs ك, ی vs ي, ە) is essential — see the sorani_arabic rules.

instruction_sources:
- repo: CohereForAI/aya_dataset
  instruction_field: inputs
  response_field: targets
  select_field: language_code
  select_value: ckb
  limit: 5000
  notes: Aya human-written instructions (Apache-2.0), filtered to ckb.
