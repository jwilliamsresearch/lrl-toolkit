display_name: Sorani Kurdish
iso639_3: ckb
iso639_1: null
nllb_code: ckb_Arab
scripts: [Arabic]
default_script: Arabic
direction: rtl
family: Iranian (Northwestern)
dialects: [Central Kurdish]
normalization:
  unicode_form: NFC
  normalize_digits: true
  rules: [arabic_presentation_forms, sorani_arabic]  # normalize ک/ك, ی/ي, ه/ە etc.
sources:
  - connector: wikipedia
    params: {wiki: ckb, license: CC-BY-SA-4.0, url: "https://ckb.wikipedia.org"}
    notes: Central Kurdish (Sorani, Arabic script) Wikipedia.
  - connector: glot500
    params: {glot: ckb_Arab, license: mixed}
  - connector: culturax
    params: {lang: ckb, license: ODC-BY-1.0}
  - connector: madlad400
    params: {lang: ckb, variant: clean, license: ODC-BY-1.0}
  - connector: oscar
    params: {lang: ckb, license: CC0-1.0}
    notes: OSCAR-2301 — GATED; set HF_TOKEN.
  - connector: opus
    params: {src: ckb, tgt: en, corpora: [OpenSubtitles, Tatoeba, NLLB], license: mixed}
  - connector: flores
    params: {flores: ckb_Arab, license: CC-BY-SA-4.0}
    notes: GATED; set HF_TOKEN.
notes: >
  Right-to-left Arabic script with Kurdish-specific letters. Character
  normalization (ک vs ك, ی vs ي, ە) is essential — see the sorani_arabic rules.
