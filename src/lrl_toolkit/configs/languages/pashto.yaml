display_name: Pashto
iso639_3: pus
iso639_1: ps
nllb_code: pbt_Arab
scripts:
- Arabic
default_script: Arabic
direction: rtl
dialects: []
normalization:
  unicode_form: NFC
  normalize_digits: true
  rules:
  - arabic_presentation_forms
sources:
- connector: wikipedia
  params:
    wiki: ps
    license: CC-BY-SA-4.0
    url: https://ps.wikipedia.org
- connector: glot500
  params:
    glot: pus_Arab
    license: mixed
- connector: culturax
  params:
    lang: ps
    license: ODC-BY-1.0
- connector: madlad400
  params:
    lang: ps
    variant: clean
    license: CC-BY-4.0
- connector: oscar
  params:
    lang: ps
    license: CC0-1.0
  notes: >
    OSCAR-2301 access is currently SUSPENDED by OSCAR's maintainers (checked
    2026-07-21), independent of HF_TOKEN. Also, CC0-1.0 covers only the
    dataset's metadata/packaging, not the underlying crawled text, which OSCAR
    explicitly disclaims holding copyright over. Do not add to ingest.sources
    until access is restored and the text-license caveat is reviewed.
- connector: opus
  params:
    src: ps
    tgt: en
    corpora:
    - OpenSubtitles
    - Tatoeba
    - NLLB
    license: mixed

instruction_sources:
- repo: CohereForAI/aya_dataset
  instruction_field: inputs
  response_field: targets
  select_field: language_code
  select_value: pbt
  limit: 5000
  notes: Aya human-written instructions (Apache-2.0), filtered to pbt.
