display_name: Persian (Farsi)
iso639_3: fas
iso639_1: fa
nllb_code: pes_Arab
scripts: [Arabic]
default_script: Arabic
direction: rtl
family: Iranian (Southwestern)
dialects: [Iranian Persian]
normalization:
  unicode_form: NFC
  normalize_digits: true
  rules: [arabic_presentation_forms, persian_yeh_kaf]  # ي->ی, ك->ک, ZWNJ handling
sources:
  - connector: wikipedia
    params: {wiki: fa, license: CC-BY-SA-4.0, url: "https://fa.wikipedia.org"}
    notes: Persian Wikipedia — large.
  - connector: glot500
    params: {glot: fas_Arab, license: mixed}
  - connector: culturax
    params: {lang: fa, license: ODC-BY-1.0}
  - connector: madlad400
    params: {lang: fa, variant: clean, license: CC-BY-4.0}
  - connector: oscar
    params: {lang: fa, license: CC0-1.0}
    notes: OSCAR-2301 — GATED; set HF_TOKEN.
  - connector: opus
    params: {src: fa, tgt: en, corpora: [OpenSubtitles, Tatoeba, NLLB], license: mixed}
notes: >
  Persian is mid-resource, not truly low-resource, but is a useful bridge/target
  and shares Arabic-script normalization needs with Sorani. Correct ZWNJ (نیم‌فاصله)
  handling matters for tokenization.

instruction_sources:
- repo: CohereForAI/aya_dataset
  instruction_field: inputs
  response_field: targets
  select_field: language_code
  select_value: pes
  limit: 5000
  notes: Aya human-written instructions (Apache-2.0), filtered to pes.
